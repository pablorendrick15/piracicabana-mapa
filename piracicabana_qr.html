<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Piracicabana - QR Code</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;color:#00ff41;font-family:Arial,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;}
h1{font-size:22px;text-align:center;margin-bottom:6px;letter-spacing:.08em;text-transform:uppercase;}
p{font-size:12px;text-align:center;color:#00cc33;margin-bottom:6px;letter-spacing:.04em;}
#qr-label{font-size:13px;font-weight:bold;text-align:center;color:#00ff41;margin-bottom:14px;letter-spacing:.15em;}
#qr-container{background:#fff;padding:18px;border-radius:4px;border:2px solid #00ff41;margin-bottom:20px;display:inline-block;}
.btn{background:transparent;border:1px solid #00ff41;color:#00ff41;padding:10px 28px;font-size:13px;cursor:pointer;border-radius:2px;letter-spacing:.06em;text-transform:uppercase;margin:4px;text-decoration:none;display:inline-block;}
.btn:hover{background:#00ff4122;}
@media print{
  .btn{display:none!important;}
  body{background:#fff;}
  #qr-container{border:2px solid #000;}
  #qr-label,h1{color:#000;}
  p{color:#333;}
}
</style>
</head>
<body>
<h1>Piracicabana</h1>
<p>Escaneie para abrir o mapa interativo</p>
<div id="qr-label">PIRACICABANA</div>
<div id="qr-container"></div>
<div style="display:flex;flex-wrap:wrap;justify-content:center;margin-top:8px;">
  <a class="btn" href="https://pablorendrick15.github.io/piracicabana-mapa/piracicabana_mapa.html" target="_blank">▶ Abrir Mapa</a>
  <button class="btn" onclick="window.print()">🖨 Imprimir QR</button>
</div>

<script>
new QRCode(document.getElementById("qr-container"), {
  text: "https://pablorendrick15.github.io/piracicabana-mapa/piracicabana_mapa.html",
  width: 256,
  height: 256,
  colorDark: "#000000",
  colorLight: "#ffffff",
  correctLevel: QRCode.CorrectLevel.H
});
</script>
</body>
</html>
