<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Piracicabana - Mapa</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    cursor: grab;
    user-select: none;
    font-family: 'Share Tech Mono', monospace;
  }
  body.grabbing { cursor: grabbing; }

  #wrap { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }

  /* ── SEARCH BAR ── */
  #search-panel {
    position: fixed;
    top: 16px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 100;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    width: min(420px, 92vw);
  }

  #search-box {
    display: flex;
    align-items: center;
    background: rgba(0, 0, 0, 0.92);
    border: 1px solid #00ff41;
    border-radius: 3px;
    width: 100%;
    box-shadow: 0 0 18px rgba(0,255,65,.25), inset 0 0 8px rgba(0,255,65,.05);
  }

  #search-icon {
    padding: 0 10px;
    color: #00ff41;
    font-size: 15px;
    opacity: .8;
    pointer-events: none;
  }

  #search-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: #00ff41;
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    padding: 9px 4px;
    letter-spacing: .06em;
  }

  #search-input::placeholder { color: #00ff4155; }

  #search-clear {
    padding: 0 10px;
    color: #00ff4188;
    font-size: 16px;
    cursor: pointer;
    display: none;
    background: none;
    border: none;
    line-height: 1;
  }
  #search-clear:hover { color: #00ff41; }

  #search-results {
    width: 100%;
    background: rgba(0,0,0,.96);
    border: 1px solid #00ff4144;
    border-top: none;
    border-radius: 0 0 3px 3px;
    max-height: 220px;
    overflow-y: auto;
    display: none;
  }
  #search-results::-webkit-scrollbar { width: 4px; }
  #search-results::-webkit-scrollbar-track { background: #000; }
  #search-results::-webkit-scrollbar-thumb { background: #00ff4155; border-radius: 2px; }

  .result-item {
    padding: 8px 14px;
    font-size: 11px;
    color: #00ff41cc;
    cursor: pointer;
    letter-spacing: .04em;
    border-bottom: 1px solid #00ff410f;
    transition: background .12s, color .12s;
  }
  .result-item:hover, .result-item.active {
    background: #00ff4115;
    color: #00ff41;
  }
  .result-item:last-child { border-bottom: none; }
  .result-count {
    padding: 5px 14px;
    font-size: 9px;
    color: #00ff4155;
    border-bottom: 1px solid #00ff410f;
    letter-spacing: .1em;
    text-transform: uppercase;
  }
  .result-none {
    padding: 10px 14px;
    font-size: 11px;
    color: #00ff4155;
    text-align: center;
  }

  /* ── HINT ── */
  .hint {
    position: fixed;
    bottom: 12px;
    left: 50%;
    transform: translateX(-50%);
    color: #00ff41;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    background: rgba(0,0,0,.8);
    padding: 5px 14px;
    border: 1px solid #00ff4144;
    border-radius: 2px;
    pointer-events: none;
    letter-spacing: .04em;
  }

  /* ── HIGHLIGHT RING ── */
  .highlight-ring {
    pointer-events: none;
    animation: ring-pulse 1.6s ease-in-out infinite;
  }
  @keyframes ring-pulse {
    0%, 100% { opacity: 1; r: 18; }
    50% { opacity: .35; r: 24; }
  }

  /* ── NAV ARROWS (for multiple results) ── */
  #nav-bar {
    position: fixed;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    display: none;
    align-items: center;
    gap: 10px;
    background: rgba(0,0,0,.88);
    border: 1px solid #00ff4166;
    border-radius: 3px;
    padding: 5px 12px;
    z-index: 100;
  }
  #nav-bar button {
    background: none;
    border: none;
    color: #00ff41;
    font-size: 16px;
    cursor: pointer;
    line-height: 1;
    padding: 2px 6px;
    border-radius: 2px;
    transition: background .1s;
  }
  #nav-bar button:hover { background: #00ff4122; }
  #nav-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: #00ff41cc;
    min-width: 70px;
    text-align: center;
    letter-spacing: .04em;
  }

  /* TITLE */
  #map-title {
    position: fixed;
    top: 16px;
    left: 20px;
    font-family: 'Orbitron', sans-serif;
    font-size: 11px;
    font-weight: 700;
    color: #00ff41;
    letter-spacing: .15em;
    text-transform: uppercase;
    opacity: .6;
    pointer-events: none;
  }

  /* ── MOBILE TWEAKS ── */
  @media (max-width: 600px) {
    #map-title { display: none; }
    .hint { font-size: 10px; padding: 4px 10px; white-space: nowrap; }

    #search-panel { top: 10px; width: 96vw; }

    #search-input {
      font-size: 16px; /* prevents iOS zoom-in on focus */
      padding: 11px 4px;
    }

    .result-item {
      padding: 13px 14px;
      font-size: 13px;
    }
    .result-count { font-size: 10px; padding: 7px 14px; }

    #nav-bar {
      bottom: 52px;
      padding: 8px 16px;
      gap: 16px;
    }
    #nav-bar button {
      font-size: 22px;
      padding: 6px 12px;
      min-width: 44px;
      min-height: 44px;
    }
    #nav-label { font-size: 13px; min-width: 60px; }
  }

  /* prevent iOS rubber-band scroll interfering */
  html, body { touch-action: none; overscroll-behavior: none; }
</style>
</head>

<div id="map-title">PIRACICABANA</div>

<!-- Search Panel -->
<div id="search-panel">
  <div id="search-box">
    <span id="search-icon">⌕</span>
    <input id="search-input" type="text" placeholder="Buscar local no mapa..." autocomplete="off" spellcheck="false">
    <button id="search-clear" title="Limpar">×</button>
  </div>
  <div id="search-results"></div>
</div>

<!-- Nav bar for multiple results -->
<div id="nav-bar">
  <button id="nav-prev">◀</button>
  <span id="nav-label">1 / 1</span>
  <button id="nav-next">▶</button>
</div>

<script>
// ── PAN / ZOOM ──
const svg = document.getElementById('map');
let s=1, tx=0, ty=0, drag=false, lx=0, ly=0;

function fit() {
  const f = Math.min(innerWidth/1440, innerHeight/810) * .97;
  s = f; tx = (innerWidth - 1440*f)/2; ty = (innerHeight - 810*f)/2;
  apply();
}
function apply() {
  svg.style.transform = `translate(${tx}px,${ty}px) scale(${s})`;
  svg.style.transformOrigin = '0 0';
}
fit();
addEventListener('resize', fit);

svg.addEventListener('wheel', e => {
  e.preventDefault();
  const f = e.deltaY < 0 ? 1.13 : .88;
  tx = e.clientX - (e.clientX - tx)*f;
  ty = e.clientY - (e.clientY - ty)*f;
  s *= f; apply();
}, {passive:false});

svg.addEventListener('mousedown', e => { drag=true; lx=e.clientX; ly=e.clientY; document.body.classList.add('grabbing'); });
addEventListener('mousemove', e => { if(!drag) return; tx+=e.clientX-lx; ty+=e.clientY-ly; lx=e.clientX; ly=e.clientY; apply(); });
addEventListener('mouseup', () => { drag=false; document.body.classList.remove('grabbing'); });
svg.addEventListener('dblclick', fit);

let ld = null;
// Track if touch started on the search panel — if so, don't intercept
function onSearchPanel(e) {
  return e.target.closest('#search-panel') || e.target.closest('#nav-bar');
}
svg.addEventListener('touchstart', e => {
  if(onSearchPanel(e)) return;
  if(e.touches.length===1){drag=true;lx=e.touches[0].clientX;ly=e.touches[0].clientY;}
  if(e.touches.length===2) ld=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
  e.preventDefault();
},{passive:false});
svg.addEventListener('touchmove', e => {
  if(onSearchPanel(e)) return;
  if(e.touches.length===1&&drag){tx+=e.touches[0].clientX-lx;ty+=e.touches[0].clientY-ly;lx=e.touches[0].clientX;ly=e.touches[0].clientY;apply();}
  if(e.touches.length===2){
    const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    if(ld){const f=d/ld;tx+=(e.touches[0].clientX+e.touches[1].clientX)/2*(1-f);ty+=(e.touches[0].clientY+e.touches[1].clientY)/2*(1-f);s*=f;apply();}
    ld=d;
  }
  e.preventDefault();
},{passive:false});
svg.addEventListener('touchend', ()=>{drag=false;ld=null;});

// ── SEARCH ──
const input      = document.getElementById('search-input');
const clearBtn   = document.getElementById('search-clear');
const resultsBox = document.getElementById('search-results');
const hlLayer    = document.getElementById('highlight-layer');
const navBar     = document.getElementById('nav-bar');
const navLabel   = document.getElementById('nav-label');
const navPrev    = document.getElementById('nav-prev');
const navNext    = document.getElementById('nav-next');

// Collect all unique labels from text nodes, grouping multi-line labels
const rawTexts = document.querySelectorAll('#labels-layer text');

// Build a smart label list: group nearby texts into "locations"
// Each location: { label, x, y, elements[] }
const locations = [];

rawTexts.forEach(el => {
  const x = parseFloat(el.getAttribute('x'));
  const y = parseFloat(el.getAttribute('y'));
  const txt = el.textContent.trim();
  if (!txt) return;

  // Try to merge with nearby existing location (within 15 SVG units vertically + ~same x)
  const nearby = locations.find(loc =>
    Math.abs(loc.x - x) < 20 && Math.abs(loc.y - y) < 14
  );
  if (nearby) {
    nearby.label += ' ' + txt;
    nearby.elements.push(el);
    nearby.y = (nearby.y + y) / 2; // center vertically
  } else {
    locations.push({ label: txt, x, y, elements: [el] });
  }
});

let matches = [];
let matchIdx = 0;

function clearHighlights() {
  hlLayer.innerHTML = '';
  // Reset all text colors
  rawTexts.forEach(el => el.setAttribute('fill', '#00ff41'));
}

function highlightLocation(loc, focused) {
  // Draw animated ring
  const r = focused ? 22 : 14;
  const circle = document.createElementNS('http://www.w3.org/2000/svg','circle');
  circle.setAttribute('cx', loc.x);
  circle.setAttribute('cy', loc.y);
  circle.setAttribute('r', r);
  circle.setAttribute('fill', focused ? 'rgba(0,255,65,0.15)' : 'rgba(0,255,65,0.07)');
  circle.setAttribute('stroke', focused ? '#00ff41' : '#00ff4166');
  circle.setAttribute('stroke-width', focused ? '1.5' : '.8');
  if (focused) circle.classList.add('highlight-ring');
  hlLayer.appendChild(circle);

  // Tint the text elements
  loc.elements.forEach(el => {
    el.setAttribute('fill', focused ? '#ffffff' : '#00ff41bb');
  });
}

function flyTo(loc) {
  // Animate pan+zoom to center the location
  const targetS = Math.max(s, 4); // zoom in to at least 4×
  const cx = loc.x * targetS;
  const cy = loc.y * targetS;
  const newTx = innerWidth/2 - cx;
  const newTy = innerHeight/2 - cy;

  // Smooth animate
  const startS=s, startTx=tx, startTy=ty;
  const dur=400; const t0=performance.now();
  function frame(now) {
    const p=Math.min((now-t0)/dur,1);
    const e=p<.5?2*p*p:1-Math.pow(-2*p+2,2)/2; // ease-in-out
    s=startS+(targetS-startS)*e;
    tx=startTx+(newTx-startTx)*e;
    ty=startTy+(newTy-startTy)*e;
    apply();
    if(p<1) requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
}

function showMatches() {
  clearHighlights();
  navBar.style.display = 'none';

  if (matches.length === 0) return;

  // Highlight all matches dimly
  matches.forEach((m, i) => highlightLocation(m, i === matchIdx));

  // Fly to current
  flyTo(matches[matchIdx]);

  if (matches.length > 1) {
    navBar.style.display = 'flex';
    navLabel.textContent = `${matchIdx+1} / ${matches.length}`;
  }
}

function doSearch(q) {
  clearHighlights();
  resultsBox.style.display = 'none';
  navBar.style.display = 'none';
  matches = [];
  matchIdx = 0;

  if (!q) { clearBtn.style.display='none'; return; }
  clearBtn.style.display = 'block';

  const norm = s => s.normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase();
  const nq = norm(q);

  matches = locations.filter(loc => norm(loc.label).includes(nq));

  // Build dropdown
  resultsBox.innerHTML = '';
  if (matches.length === 0) {
    resultsBox.innerHTML = '<div class="result-none">Nenhum local encontrado</div>';
    resultsBox.style.display = 'block';
    return;
  }

  resultsBox.innerHTML = `<div class="result-count">${matches.length} resultado${matches.length>1?'s':''} encontrado${matches.length>1?'s':''}</div>`;
  matches.forEach((m, i) => {
    const d = document.createElement('div');
    d.className = 'result-item' + (i===0?' active':'');
    d.textContent = m.label;
    const selectItem = () => {
      matchIdx = i;
      document.querySelectorAll('.result-item').forEach((el,j)=>el.classList.toggle('active',j===i));
      showMatches();
      resultsBox.style.display = 'none';
      input.blur(); // dismiss keyboard on mobile
    };
    d.addEventListener('click', selectItem);
    d.addEventListener('touchend', e => { e.preventDefault(); selectItem(); });
    resultsBox.appendChild(d);
  });
  resultsBox.style.display = 'block';

  // Auto-go to first
  showMatches();
}

input.addEventListener('input', e => doSearch(e.target.value.trim()));
input.addEventListener('focus', () => { if (matches.length > 0) resultsBox.style.display = 'block'; });
input.addEventListener('keydown', e => {
  if (e.key === 'Escape') { input.value=''; doSearch(''); input.blur(); }
  if (e.key === 'Enter') { resultsBox.style.display='none'; input.blur(); }
  if (e.key === 'ArrowDown') {
    if (matches.length>1){ matchIdx=(matchIdx+1)%matches.length; showMatches(); navLabel.textContent=`${matchIdx+1} / ${matches.length}`; }
  }
  if (e.key === 'ArrowUp') {
    if (matches.length>1){ matchIdx=(matchIdx-1+matches.length)%matches.length; showMatches(); navLabel.textContent=`${matchIdx+1} / ${matches.length}`; }
  }
});

clearBtn.addEventListener('click', () => { input.value=''; doSearch(''); input.focus(); });

document.addEventListener('click', e => {
  if (!e.target.closest('#search-panel')) resultsBox.style.display='none';
});

navNext.addEventListener('click', () => {
  matchIdx = (matchIdx+1) % matches.length;
  showMatches();
});
navPrev.addEventListener('click', () => {
  matchIdx = (matchIdx-1+matches.length) % matches.length;
  showMatches();
});
</script>
